<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Moony's World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Nunito:wght@400;500;600;700&family=Gochi+Hand&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    color-scheme:light;
    --wall:#FBF3E3; --paper:#FCF6EA; --card:#FFFFFF; --ink:#33291f; --muted:#8a7d68;
    --red:#E8503A; --mustard:#EFA72C; --green:#3F8F5A; --blue:#3E7CC4; --pink:#EE8AA6; --plum:#8b5fbf;
    --soft:0 6px 16px rgba(58,47,34,.10); --soft-lg:0 12px 26px rgba(58,47,34,.13);
    --display:"Bricolage Grotesque",system-ui,sans-serif; --body:"Nunito",system-ui,sans-serif; --hand:"Gochi Hand",cursive;
    --c:var(--mustard);
  }
  html{background:var(--wall)}
  body{background:var(--wall);color:var(--ink);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;transition:background .4s}
  .page{background:var(--wall);min-height:100vh;padding-bottom:36px;transition:background .4s}
  .topbar,.checker{transition:background .4s}
  a{color:inherit}
  h1,h2,h3,h4{font-family:var(--display);line-height:1.08}

  .checker{height:16px;width:100%;
    background:repeating-conic-gradient(var(--mustard) 0% 25%, #FFF7E6 0% 50%) 0 0 / 18px 18px;opacity:.9}

  /* ---------- top bar ---------- */
  .topbar{position:relative;background:var(--wall);
    padding:10px 15px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:800;font-size:19px}
  .brand svg{width:26px;height:26px;flex:none}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;border:2px solid var(--mustard);border-radius:999px;padding:2px;gap:2px;background:var(--card)}
  .seg button{border:0;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--display);
    font-weight:700;font-size:12px;padding:5px 11px;border-radius:999px;transition:.15s}
  .seg button[aria-pressed="true"]{background:var(--mustard);color:#fff}
  .send-link{font-family:var(--display);font-weight:700;font-size:13px;text-decoration:none;
    background:var(--green);color:#fff;border-radius:999px;padding:7px 15px;box-shadow:var(--soft);transition:.12s}
  .send-link:hover{transform:translateY(-1px);box-shadow:var(--soft-lg)}

  /* ---------- hero ---------- */
  .hero{position:relative;background:radial-gradient(ellipse at 50% 20%, #FFFFFF, var(--wall) 70%);
    padding:30px 20px 10px;text-align:center;overflow:hidden}
  .stars{position:absolute;inset:0;pointer-events:none}
  .stars span{position:absolute;font-size:15px;animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
  .header-img{display:block;width:92%;max-width:440px;margin:4px auto 0;filter:drop-shadow(0 10px 14px rgba(58,47,34,.18))}
  .hero h1{font-size:clamp(40px,11vw,68px);font-weight:800;letter-spacing:-.01em;position:relative;z-index:2}
  .hero .sub{color:var(--ink);opacity:.72;font-size:clamp(15px,4vw,18px);margin-top:10px;max-width:32ch;margin-inline:auto;font-weight:600;position:relative;z-index:2}
  .note{max-width:600px;margin:20px auto 0;background:var(--card);border-radius:22px;
    padding:16px 20px;font-size:15px;box-shadow:var(--soft);text-align:left;position:relative;z-index:2;border-left:7px solid var(--pink)}
  .note b{font-weight:700}
  .scallop{height:20px;width:100%;margin-top:24px;
    background:radial-gradient(circle at 11px 20px, var(--green) 11px, transparent 12px) repeat-x;
    background-size:22px 20px;opacity:.9}

  /* ---------- progress ---------- */
  .progress-wrap{max-width:600px;margin:24px auto 0;padding:0 20px}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;font-size:14px;color:var(--muted);font-weight:600}
  .progress-top b{color:var(--ink);font-family:var(--display);font-size:16px}
  .bar{height:16px;background:#fff;border:2px solid rgba(58,47,34,.12);border-radius:999px;overflow:hidden;box-shadow:var(--soft)}
  .bar>i{display:block;height:100%;width:0;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1);
    background:linear-gradient(90deg,var(--pink),var(--mustard),var(--green),var(--blue))}

  /* ---------- sections (painted-wall colour blocks) ---------- */
  main{max-width:900px;margin:0 auto;padding:6px 14px 30px}
  .cat{margin-top:22px;padding:16px 15px 22px;border-radius:28px}
  .pennant{display:inline-flex;align-items:center;gap:8px;font-family:var(--display);font-weight:800;
    font-size:15px;letter-spacing:.02em;color:#fff;padding:7px 26px 7px 15px;margin:2px 0 16px 2px;background:var(--c);
    clip-path:polygon(0 0,100% 0,calc(100% - 13px) 50%,100% 100%,0 100%);text-transform:uppercase;box-shadow:var(--soft)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:15px}
  .card{background:var(--card);border:2px solid var(--c);border-radius:20px;box-shadow:var(--soft);
    overflow:hidden;display:flex;flex-direction:column;transition:transform .16s,box-shadow .16s}
  .card:hover{transform:translateY(-3px);box-shadow:var(--soft-lg)}
  .card.claimed{opacity:.72}
  .thumb{height:118px;display:grid;place-items:center;position:relative;text-decoration:none;
    background:color-mix(in srgb, var(--c) 16%, #fff)}
  .thumb svg{width:52px;height:52px}
  .thumb .go{position:absolute;right:9px;bottom:9px;background:#fff;border-radius:999px;color:var(--c);
    font-family:var(--display);font-weight:700;font-size:11px;padding:4px 10px;box-shadow:var(--soft)}
  .body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:9px;flex:1}
  .card h3{font-size:19px;font-weight:700}
  .card h3 a{text-decoration:none}
  .card h3 a:hover{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:2px}
  .spec{font-size:13.5px;color:var(--muted);font-weight:600}
  .price{font-family:var(--display);font-weight:700;font-size:17px;color:var(--c)}
  .stores{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .store-lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .chip{font-size:12.5px;font-weight:700;font-family:var(--display);text-decoration:none;padding:4px 12px;border-radius:999px;
    border:2px solid var(--c);background:#fff;color:var(--ink);transition:.12s;white-space:nowrap}
  .chip:hover{background:var(--c);color:#fff}
  .foot{margin-top:auto;padding-top:4px}
  .claim-btn{width:100%;border:0;cursor:pointer;font-family:var(--display);font-weight:700;
    font-size:15px;padding:12px;border-radius:13px;background:var(--green);color:#fff;box-shadow:var(--soft);transition:.12s}
  .claim-btn:hover{transform:translateY(-1px);box-shadow:var(--soft-lg)}
  .stamp{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .stamp .badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--display);font-weight:700;font-size:13.5px;
    background:color-mix(in srgb, var(--green) 14%, #fff);border-radius:10px;padding:6px 11px;color:var(--green);transform:rotate(-2deg)}
  .stamp .badge svg{width:16px;height:16px}
  .undo{border:0;background:transparent;color:var(--muted);text-decoration:underline;cursor:pointer;font-family:var(--body);font-weight:700;font-size:12.5px}

  /* ---------- sending a gift ---------- */
  .sendbox{max-width:640px;margin:40px auto 0;padding:0 16px}
  .sendcard{background:var(--card);border-radius:24px;box-shadow:var(--soft-lg);overflow:hidden}
  .sendcard .top{background:var(--pink);padding:16px 22px;display:flex;align-items:center;gap:12px}
  .sendcard .top svg{width:38px;height:38px;flex:none}
  .sendcard .top h2{font-size:24px;font-weight:800;color:#fff}
  .sendcard .inner{padding:20px 22px 24px}
  .sendcard p{font-size:15px;margin-bottom:16px}
  .addr{background:color-mix(in srgb, var(--blue) 8%, #fff);border:2px dashed var(--blue);border-radius:16px;padding:16px 18px}
  .addr .lbl{font-family:var(--display);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:6px}
  .addr .val{font-size:16px;font-weight:700;line-height:1.55}
  .addr.hidden .val{filter:blur(6px);user-select:none}
  .reveal{margin-top:12px;border:0;background:var(--blue);color:#fff;font-family:var(--display);
    font-weight:700;font-size:14px;padding:10px 16px;border-radius:12px;cursor:pointer;box-shadow:var(--soft);transition:.12s}
  .reveal:hover{transform:translateY(-1px);box-shadow:var(--soft-lg)}
  .addr.shown .reveal{display:none}

  footer{text-align:center;color:var(--muted);font-size:13.5px;font-weight:600;padding:34px 20px 10px}
  footer .hand{font-family:var(--hand);font-size:21px;color:var(--ink)}

  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(58,47,34,.5);display:none;place-items:center;z-index:50;padding:20px}
  .overlay.open{display:grid}
  .modal{background:var(--card);border-radius:22px;padding:24px;width:100%;max-width:370px;box-shadow:var(--soft-lg);border-top:8px solid var(--mustard)}
  .modal h4{font-size:22px;margin-bottom:4px}
  .modal p{font-size:14px;color:var(--muted);font-weight:600;margin-bottom:14px}
  .modal input{width:100%;padding:12px 14px;border:2px solid var(--mustard);border-radius:12px;font-family:var(--body);font-weight:600;font-size:15px;background:var(--paper);color:var(--ink)}
  .modal input:focus{outline:none;box-shadow:0 0 0 3px rgba(239,167,44,.35)}
  .modal-actions{display:flex;gap:10px;margin-top:16px}
  .modal-actions button{flex:1;padding:12px;border-radius:12px;font-family:var(--display);font-weight:700;font-size:14px;cursor:pointer;border:0}
  .btn-ghost{background:#f0e7d6;color:var(--ink)}
  .btn-solid{background:var(--green);color:#fff;box-shadow:var(--soft)}

  /* ===== sticky header + tabs ===== */
  .stickyhead{position:sticky;top:0;z-index:30;background:var(--wall);transition:background .4s}
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:9px 14px;background:var(--wall);-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{flex:none;border:2px solid var(--ink);background:var(--card);color:var(--ink);font-family:var(--display);font-weight:700;font-size:14px;padding:8px 15px;border-radius:999px;cursor:pointer;transition:.12s;white-space:nowrap}
  .tabs button[aria-selected="true"]{background:var(--mustard);color:#fff;border-color:var(--mustard)}
  .view{display:none}
  .view.active{display:block;animation:fade .3s}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  /* shared view header + panel + form bits */
  .view-head{text-align:center;padding:26px 20px 4px}
  .view-head svg{width:54px;height:54px}
  .view-head h1{font-family:var(--display);font-weight:800;font-size:clamp(30px,8vw,44px);margin-top:6px}
  .view-head p{color:var(--muted);font-weight:600;max-width:34ch;margin:8px auto 0;font-size:15.5px}
  .panel{background:var(--card);border-radius:22px;box-shadow:var(--soft);padding:22px;max-width:600px;margin:16px auto 0}
  .panel h2{font-family:var(--display);font-size:20px;margin-bottom:4px}
  .field{width:100%;padding:11px 13px;border:2px solid #ece2cc;border-radius:12px;font-family:var(--body);font-weight:600;font-size:15px;background:var(--paper);color:var(--ink);margin-top:9px}
  .field:focus{outline:none;border-color:var(--mustard)}
  .btn{border:0;cursor:pointer;font-family:var(--display);font-weight:700;font-size:15px;padding:12px 18px;border-radius:13px;background:var(--green);color:#fff;box-shadow:var(--soft);transition:.12s}
  .btn:hover{transform:translateY(-1px);box-shadow:var(--soft-lg)}
  .row{display:flex;gap:10px;flex-wrap:wrap}

  /* countdown */
  .cd{text-align:center}
  .cd .big{font-family:var(--display);font-weight:800;font-size:clamp(64px,20vw,116px);line-height:1;color:var(--red)}
  .cd-digits{display:flex;justify-content:center;align-items:flex-end;gap:6px;margin:4px 0 2px}
  .cd-digits img{height:96px;width:auto;filter:drop-shadow(0 6px 8px rgba(58,47,34,.18))}
  .cd .lbl{font-family:var(--display);font-weight:700;font-size:18px;margin-top:2px}
  .cd .week{margin-top:16px;font-size:16px;font-weight:700;color:var(--muted)}
  .cd .fruit{margin-top:4px;font-family:var(--display);font-weight:700;font-size:17px;color:var(--green)}

  /* bolao */
  .gender{display:flex;gap:12px;margin-top:6px}
  .gender button{flex:1;border:2.5px solid var(--ink);cursor:pointer;font-family:var(--display);font-weight:800;font-size:17px;padding:20px 8px;border-radius:16px;background:#fff;transition:.12s}
  .gender button.pink{color:var(--pink)}.gender button.blue{color:var(--blue)}
  .gender button:hover{transform:translateY(-2px);box-shadow:var(--soft-lg)}
  .tally{display:flex;height:32px;border-radius:999px;overflow:hidden;border:2px solid var(--ink);margin-top:14px;font-family:var(--display);font-weight:700;font-size:14px;color:#fff}
  .tally .g{display:grid;place-items:center;min-width:36px;transition:flex .4s}
  .tally .pink{background:var(--pink)}.tally .blue{background:var(--blue)}
  .voters{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .voter{font-size:12.5px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--paper);border:1.5px solid #ece2cc}
  .guess-card{background:var(--paper);border-radius:14px;padding:12px 14px;margin-top:10px;border-left:5px solid var(--mustard)}
  .guess-card b{font-family:var(--display)}
  .guess-card .meta{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px}

  /* library */
  .shelf{background:linear-gradient(180deg,#e7c79a,#d6ae7c);border-radius:14px;padding:16px 12px 12px;margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end;min-height:120px;box-shadow:inset 0 -9px 0 rgba(0,0,0,.13)}
  .spine{width:27px;border-radius:3px 3px 2px 2px;border:2px solid rgba(0,0,0,.32);cursor:pointer;display:grid;align-content:center;transition:.12s;box-shadow:1px 1px 3px rgba(0,0,0,.2)}
  .spine span{writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--display);font-weight:700;font-size:9px;color:#fff;text-align:left;padding:5px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spine:hover{transform:translateY(-5px)}
  .book-detail{margin-top:12px;background:var(--paper);border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;color:var(--muted)}

  /* wishes */
  .wishwall{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .wishnote{padding:14px;border-radius:10px;box-shadow:var(--soft);font-size:14px;font-weight:600;transform:rotate(-1.5deg)}
  .wishnote:nth-child(even){transform:rotate(1.5deg)}
  .wishnote .who{display:block;margin-top:8px;font-family:var(--display);font-weight:700;font-size:12.5px;opacity:.85}
  .wishnote .tag{font-family:var(--display);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;opacity:.65}

  .locked{position:relative;overflow:hidden}
  .locked > :not(.lock-badge){filter:blur(4px);pointer-events:none;user-select:none;opacity:.7}
  .lock-badge{position:absolute;inset:0;display:grid;place-items:center;z-index:5;background:rgba(251,243,227,.35)}
  .lock-badge span{font-family:var(--display);font-weight:800;font-size:15px;color:var(--ink);background:var(--card);border:2px solid var(--ink);border-radius:16px;padding:12px 18px;box-shadow:var(--soft);text-align:center;max-width:82%}
  .hero,.scallop,.progress-wrap,#list,.sendbox,.send-link{display:none}
  :focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  @media (max-width:520px){.topbar{justify-content:center}.grid{grid-template-columns:1fr}.hero h1{font-size:44px}}
</style>
</head>
<body>
<div class="page">
<header class="stickyhead">

<div class="topbar">
  <div class="brand">
    <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="17" fill="#EFA72C" stroke="#3a2f22" stroke-width="2.5"/><path d="M26 10a13 13 0 1 0 0 20 15 15 0 0 1 0-20z" fill="#FCF6EA"/><circle cx="15" cy="18" r="1.6" fill="#3a2f22"/><circle cx="22" cy="18" r="1.6" fill="#3a2f22"/><path d="M15 23q4 3 8 0" stroke="#3a2f22" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    Moony's World
  </div>
  <div class="controls">
    <div class="seg lang" role="group" aria-label="Language">
      <button data-lang="en" aria-pressed="true">EN</button>
      <button data-lang="pt" aria-pressed="false">PT</button>
      <button data-lang="it" aria-pressed="false">IT</button>
    </div>
    <a class="send-link" href="#sending" data-i18n="sendNav">Sending a gift?</a>
  </div>
</div>
<div class="checker"></div>
<nav class="tabs" id="tabs" role="tablist">
  <button data-tab="countdown" aria-selected="true"  data-i18n="tabCountdown"></button>
  <button data-tab="wishlist"  aria-selected="false" data-i18n="tabWishlist"></button>
  <button data-tab="bolao"     aria-selected="false" data-i18n="tabBolao"></button>
  <button data-tab="library"   aria-selected="false" data-i18n="tabLibrary"></button>
  <button data-tab="wishes"    aria-selected="false" data-i18n="tabWishes"></button>
</nav>
</header>

<img class="header-img" src="assets/header.png" alt="Moony's World">

<section class="view" data-view="wishlist">
<div class="panel" style="text-align:center;margin-top:26px"><h2 data-i18n="lockHead"></h2><p data-i18n="lockBody" style="margin-top:10px;font-size:15px;line-height:1.6"></p></div>
<section class="hero">
  <div class="stars" aria-hidden="true"></div>
  <p class="sub" data-i18n="sub"></p>
  <div class="note" data-i18n="note"></div>
</section>
<div class="scallop"></div>

<div class="progress-wrap">
  <div class="progress-top">
    <span><b id="claimedCount">0</b> <span data-i18n="spoken"></span></span>
    <span id="totalCount"></span>
  </div>
  <div class="bar"><i id="barFill"></i></div>
</div>

<main id="list"></main>

<section class="sendbox" id="sending">
  <div class="sendcard">
    <div class="top">
      <svg viewBox="0 0 40 40" aria-hidden="true"><rect x="4" y="9" width="32" height="22" rx="3" fill="#FCF6EA" stroke="#3a2f22" stroke-width="2.5"/><path d="M5 11l15 11 15-11" fill="none" stroke="#3a2f22" stroke-width="2.5" stroke-linejoin="round"/><path d="M28 4l2.2 4.5L35 9l-3.5 3 .9 5-4.4-2.5L23.6 17l.9-5L21 9l4.8-.5z" fill="#EFA72C" stroke="#3a2f22" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <h2 data-i18n="sendTitle"></h2>
    </div>
    <div class="inner">
      <p data-i18n="sendBody"></p>
      <div class="addr hidden" id="addr">
        <div class="lbl" data-i18n="shipTo"></div>
        <div class="val">Marina &amp; Ryan<br>&lsaquo; your Melbourne address &rsaquo;<br>VIC, Australia</div>
        <button class="reveal" id="revealBtn" data-i18n="reveal"></button>
      </div>
    </div>
  </div>
</section>
</section><!-- /wishlist -->

<section class="view active" data-view="countdown">
  <div class="view-head">
    <svg viewBox="0 0 64 64"><path d="M44 12a24 24 0 1 0 0 40 28 28 0 0 1 0-40z" fill="#EFA72C" stroke="#3a2f22" stroke-width="3"/></svg>
    <h1 data-i18n="cdHead"></h1><p data-i18n="cdIntro"></p>
  </div>
  <div class="panel cd">
    <div class="big" id="cdDays">–</div>
    <div class="lbl" data-i18n="cdDaysLbl"></div>
    <div class="week" id="cdWeek"></div>
    <div class="fruit" id="cdFruit"></div>
    <div class="cddue" data-i18n="cdDue" style="margin-top:12px;font-family:var(--display);font-weight:700;font-size:16px;color:var(--green)"></div>
  </div>
  <div class="panel" style="margin-top:16px">
    <h2 data-i18n="whyHead" style="text-align:center"></h2>
    <div id="whyBody" style="font-size:16px;line-height:1.7;margin-top:8px"></div>
  </div>
</section>


<section class="view" data-view="bolao">
  <div class="view-head">
    <svg viewBox="0 0 64 64"><path d="M32 6l7 16 17 1-13 11 4 17-15-9-15 9 4-17L8 23l17-1z" fill="#E8503A" stroke="#3a2f22" stroke-width="3" stroke-linejoin="round"/></svg>

let lang="en",pendingId=null;

function render(){
  const order=["essentials","sleep","out","library"];
  listEl.innerHTML="";
  order.forEach(k=>{
    const inCat=ITEMS.filter(i=>i.cat===k); if(!inCat.length)return;
    const c=CATS[k];
    const sec=document.createElement("section");sec.className="cat";
    sec.style.setProperty("--c",c.color);
    sec.innerHTML=`<span class="pennant">${c[lang]}</span><div class="grid"></div>`;
    const grid=sec.querySelector(".grid");
    inCat.forEach(item=>{
      const [name,spec]=item[lang];
      const card=document.createElement("article");
      card.className="card"+(item.claimed?" claimed":"");
      const stores=item.stores.map(([n,u])=>`<a class="chip" href="${u}" target="_blank" rel="noopener">${n}</a>`).join("");
      const foot=item.claimed
        ?`<div class="stamp"><span class="badge">${STAR}${T[lang].spokenBy} ${item.claimed.by}</span><button class="undo" data-unclaim="${item.id}">${T[lang].undo}</button></div>`
        :`<button class="claim-btn" data-claim="${item.id}">${T[lang].claim}</button>`;
      card.innerHTML=`
        <a class="thumb" href="${item.link}" target="_blank" rel="noopener">${MOTIF[item.cat]}<span class="go">${T[lang].view} ↗</span></a>
        <div class="body">
          <h3><a href="${item.link}" target="_blank" rel="noopener">${name}</a></h3>
          <p class="spec">${spec}</p>
          <div class="price">${item.price}</div>
          <div class="stores"><span class="store-lbl">${T[lang].storeLbl}</span>${stores}</div>
          <div class="foot">${foot}</div>
        </div>`;
      grid.appendChild(card);
    });
    listEl.appendChild(sec);
  });
  updateProgress();applyText();
}
function updateProgress(){
  const total=ITEMS.length,done=ITEMS.filter(i=>i.claimed).length;
  document.getElementById("claimedCount").textContent=done;
  document.getElementById("totalCount").textContent=T[lang].total(total);
  document.getElementById("barFill").style.width=(done/total*100)+"%";
}
function applyText(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k=el.getAttribute("data-i18n");
    if(T[lang][k]!==undefined) el.innerHTML=T[lang][k];
  });
}
listEl.addEventListener("click",e=>{
  const cl=e.target.closest("[data-claim]"),un=e.target.closest("[data-unclaim]");
  if(cl){openModal(+cl.dataset.claim);}
  if(un){ITEMS.find(i=>i.id===+un.dataset.unclaim).claimed=null;render();}
});
document.querySelectorAll(".seg.lang button").forEach(b=>b.addEventListener("click",()=>{
  lang=b.dataset.lang;document.documentElement.lang=lang;
  document.querySelectorAll(".seg.lang button").forEach(x=>x.setAttribute("aria-pressed",x===b));
  render();renderDynamic();applyPH();
}));
const overlay=document.getElementById("overlay"),nameInput=document.getElementById("nameInput");
function openModal(id){pendingId=id;nameInput.value="";overlay.classList.add("open");setTimeout(()=>nameInput.focus(),50);}
function closeModal(){overlay.classList.remove("open");pendingId=null;}
document.getElementById("cancelBtn").addEventListener("click",closeModal);
overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
document.getElementById("confirmBtn").addEventListener("click",confirmClaim);
nameInput.addEventListener("keydown",e=>{if(e.key==="Enter")confirmClaim();});
function confirmClaim(){const nm=nameInput.value.trim();if(!nm){nameInput.focus();return;}const it=ITEMS.find(i=>i.id===pendingId);if(it)it.claimed={by:nm};closeModal();render();}
document.getElementById("revealBtn").addEventListener("click",()=>{const a=document.getElementById("addr");a.classList.remove("hidden");a.classList.add("shown");});
(function stars(){const w=document.querySelector(".stars");const cols=["#E8503A","#EFA72C","#3F8F5A","#3E7CC4","#EE8AA6"];for(let i=0;i<12;i++){const s=document.createElement("span");s.textContent="✦";s.style.left=Math.random()*100+"%";s.style.top=Math.random()*78+"%";s.style.color=cols[i%cols.length];s.style.animationDelay=(Math.random()*3)+"s";s.style.fontSize=(10+Math.random()*10)+"px";w.appendChild(s);}})();
/* ===== tabs ===== */
function initTabs(){
  document.querySelectorAll(".tabs button").forEach(b=>b.addEventListener("click",()=>{
    const t=b.dataset.tab;
    document.querySelectorAll(".tabs button").forEach(x=>x.setAttribute("aria-selected",x===b));
    document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.dataset.view===t));
    window.scrollTo({top:0,behavior:"smooth"});
  }));
}
function applyPH(){document.querySelectorAll("[data-i18n-ph]").forEach(el=>{const k=el.getAttribute("data-i18n-ph");if(T[lang][k]!==undefined)el.setAttribute("placeholder",T[lang][k]);});}
/* countdown */
const DUE=new Date("2027-02-18T00:00:00");
const WEEK_ANCHOR=new Date("2026-07-09T00:00:00");
const FRUIT={5:"sesame seed",6:"sweet pea",7:"blueberry",8:"raspberry",9:"cherry",10:"strawberry",11:"lime",12:"plum",13:"lemon",14:"peach",15:"apple",16:"avocado",17:"pear",18:"bell pepper",19:"mango",20:"banana",21:"carrot",22:"papaya",23:"grapefruit",24:"ear of corn",25:"cauliflower",26:"lettuce",27:"cabbage",28:"eggplant",29:"butternut squash",30:"cucumber",31:"coconut",32:"jicama",33:"pineapple",34:"cantaloupe",35:"honeydew",36:"romaine lettuce",37:"chard",38:"leek",39:"mini watermelon",40:"small pumpkin"};
function startCountdown(){
  const days=Math.max(0,Math.ceil((DUE-new Date())/864e5));
  const week=Math.min(42,Math.max(0,8+Math.floor((new Date()-WEEK_ANCHOR)/(7*864e5))));
  const cd=document.getElementById("cdDays");cd.className="cd-digits";
  cd.innerHTML=String(days).split("").map((dg,i)=>{const useB=["3","4","7","8","9"].includes(dg)&&((days+i)%2===1);return `<img src="assets/digits/${dg}${useB?"-b":""}.png" alt="${dg}">`;}).join("");
  document.getElementById("cdWeek").textContent=T[lang].cdWeek(week);
  document.getElementById("cdFruit").textContent=T[lang].cdFruit(FRUIT[week]||"tiny wonder");
}
/* bolão */
let R1=[],R2=[];
function renderBolao(){
  const g=R1.filter(v=>v.g==="girl").length,b=R1.filter(v=>v.g==="boy").length;
  document.getElementById("tally").innerHTML=`<div class="g pink" style="flex:${g||.001}">${g}</div><div class="g blue" style="flex:${b||.001}">${b}</div>`;
  document.getElementById("voters").innerHTML=R1.map(v=>`<span class="voter">${v.n} · ${v.g==="girl"?T[lang].girl:T[lang].boy}</span>`).join("");
  document.getElementById("guessList").innerHTML=R2.map(x=>`<div class="guess-card"><b>${x.n}</b><div class="meta">${T[lang].gDate}: ${x.date||"—"} · ${T[lang].gWeight}: ${x.w||"—"} · ${T[lang].gLength}: ${x.l||"—"}${x.word?` · “${x.word}”`:""}</div></div>`).join("");
}
/* library */
let BOOKS=[{t:"Guess How Much I Love You",a:"Sam McBratney",by:"Nonna"},{t:"The Very Hungry Caterpillar",a:"Eric Carle",by:"Zia Chiara"},{t:"Where the Wild Things Are",a:"Maurice Sendak",by:"Ryan"}];
const SPINE_COLS=["#E8503A","#EFA72C","#3F8F5A","#3E7CC4","#EE8AA6","#8b5fbf"];
function renderLibrary(){
  const sh=document.getElementById("shelf");
  sh.innerHTML=BOOKS.map((bk,i)=>`<div class="spine" data-i="${i}" style="background:${SPINE_COLS[i%SPINE_COLS.length]};height:${82+((i*11)%26)}px"><span>${bk.t}</span></div>`).join("");
  sh.querySelectorAll(".spine").forEach(s=>s.addEventListener("click",()=>{
    const bk=BOOKS[+s.dataset.i];
    document.getElementById("bookDetail").innerHTML=`<b style="color:var(--ink)">${bk.t}</b>${bk.a?` — ${bk.a}`:""}<br>${T[lang].suggestedBy} ${bk.by||T[lang].someone}`;
  }));
}
/* wishes */
let WISHES=[{n:"Nonna",m:"Sleep when the baby sleeps — trust me!",t:"advice"},{n:"Zia Chiara",m:"Auguri! Can't wait to meet little Moony.",t:"wish"}];
let wishType="advice";
const WISH_COLS={advice:"#EAF1FB",wish:"#FBEAF1"};
function renderWishes(){
  document.getElementById("wishwall").innerHTML=WISHES.map(w=>`<div class="wishnote" style="background:${WISH_COLS[w.t]}"><span class="tag">${w.t==="advice"?T[lang].tagAdvice:T[lang].tagWish}</span><div>${w.m}</div><span class="who">— ${w.n}</span></div>`).join("");
  document.getElementById("typeAdvice").style.opacity=wishType==="advice"?1:.5;
  document.getElementById("typeWish").style.opacity=wishType==="wish"?1:.5;
}
function renderWhy(){document.getElementById("whyBody").innerHTML=T[lang].whyStory;}
function renderDynamic(){startCountdown();renderWhy();renderBolao();renderLibrary();renderWishes();}

document.querySelectorAll(".gender button").forEach(b=>b.addEventListener("click",()=>{
  const el=document.getElementById("gName"),n=el.value.trim();
  if(!n){el.focus();return;}
  R1.push({n,g:b.dataset.guess});el.value="";renderBolao();
}));
document.getElementById("bgSubmit").addEventListener("click",()=>{
  const el=document.getElementById("bgName"),n=el.value.trim();
  if(!n){el.focus();return;}
  R2.push({n,date:document.getElementById("bgDate").value,w:document.getElementById("bgWeight").value.trim(),l:document.getElementById("bgLength").value.trim(),word:document.getElementById("bgWord").value.trim()});
  ["bgName","bgDate","bgWeight","bgLength","bgWord"].forEach(id=>document.getElementById(id).value="");renderBolao();
});
document.getElementById("bkAdd").addEventListener("click",()=>{
  const el=document.getElementById("bkTitle"),t=el.value.trim();
  if(!t){el.focus();return;}
  BOOKS.push({t,a:document.getElementById("bkAuthor").value.trim(),by:document.getElementById("bkBy").value.trim()||T[lang].someone});
  ["bkTitle","bkAuthor","bkBy"].forEach(id=>document.getElementById(id).value="");renderLibrary();
});
document.getElementById("typeAdvice").addEventListener("click",()=>{wishType="advice";renderWishes();});
document.getElementById("typeWish").addEventListener("click",()=>{wishType="wish";renderWishes();});
document.getElementById("wAdd").addEventListener("click",()=>{
  const m=document.getElementById("wMsg").value.trim();
  if(!m){document.getElementById("wMsg").focus();return;}
  WISHES.push({n:document.getElementById("wName").value.trim()||T[lang].someone,m,t:wishType});
  document.getElementById("wName").value="";document.getElementById("wMsg").value="";renderWishes();
});

initTabs();
render();renderDynamic();applyPH();
</script>
</body>
