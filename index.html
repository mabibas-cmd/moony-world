<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Moony's World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Nunito:wght@400;500;600;700&family=Gochi+Hand&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    color-scheme:light;
    --wall:#FBF3E3; --paper:#FCF6EA; --card:#FFFFFF; --ink:#33291f; --muted:#8a7d68;
    --red:#E8503A; --mustard:#EFA72C; --green:#3F8F5A; --blue:#3E7CC4; --pink:#EE8AA6; --plum:#8b5fbf;
    --soft:0 6px 16px rgba(58,47,34,.10); --soft-lg:0 12px 26px rgba(58,47,34,.13);
    --display:"Bricolage Grotesque",system-ui,sans-serif; --body:"Nunito",system-ui,sans-serif; --hand:"Gochi Hand",cursive;
    --c:var(--mustard);
  }
  html{background:var(--wall)}
  body{background:var(--wall);color:var(--ink);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;transition:background .4s}
  .page{background:var(--wall);min-height:100vh;padding-bottom:36px;transition:background .4s}
  .topbar,.checker,.walls{transition:background .4s}
  a{color:inherit}
  h1,h2,h3,h4{font-family:var(--display);line-height:1.08}

  .checker{height:16px;width:100%;
    background:repeating-conic-gradient(var(--mustard) 0% 25%, #FFF7E6 0% 50%) 0 0 / 18px 18px;opacity:.9}
  .walls{display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap;padding:11px 16px;background:rgba(255,255,255,.35)}
  .walls .wlbl{font-family:var(--display);font-weight:700;font-size:12px;color:var(--ink);opacity:.85;text-transform:uppercase;letter-spacing:.05em}
  .walls button{width:26px;height:26px;border-radius:50%;border:2.5px solid #fff;cursor:pointer;box-shadow:0 2px 6px rgba(58,47,34,.25);transition:transform .12s;padding:0}
  .walls button:hover{transform:scale(1.12)}
  .walls button[aria-pressed="true"]{outline:2.5px solid var(--ink);outline-offset:2px}

  /* ---------- top bar ---------- */
  .topbar{position:sticky;top:0;z-index:30;background:var(--wall);
    padding:10px 15px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:800;font-size:19px}
  .brand svg{width:26px;height:26px;flex:none}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;border:2px solid var(--mustard);border-radius:999px;padding:2px;gap:2px;background:var(--card)}
  .seg button{border:0;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--display);
    font-weight:700;font-size:12px;padding:5px 11px;border-radius:999px;transition:.15s}
  .seg button[aria-pressed="true"]{background:var(--mustard);color:#fff}
  .send-link{font-family:var(--display);font-weight:700;font-size:13px;text-decoration:none;
    background:var(--pink);color:#fff;border-radius:999px;padding:7px 15px;box-shadow:var(--soft);transition:.12s}
  .send-link:hover{transform:translateY(-1px);box-shadow:var(--soft-lg)}

  /* ---------- hero ---------- */
  .hero{position:relative;background:radial-gradient(ellipse at 50% 20%, #FFFFFF, var(--wall) 70%);
    padding:30px 20px 10px;text-align:center;overflow:hidden}
  .stars{position:absolute;inset:0;pointer-events:none}
  .stars span{position:absolute;font-size:15px;animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
  .hero-illo{display:flex;justify-content:center;gap:14px;align-items:flex-end;margin-bottom:6px}
  .hero-illo svg{width:62px;height:62px}
  .hero h1{font-size:clamp(40px,11vw,68px);font-weight:800;letter-spacing:-.01em;position:relative;z-index:2}
  .header-img{display:block;width:82%;max-width:360px;margin:4px auto 0;filter:drop-shadow(0 10px 14px rgba(58,47,34,.18));}
  .hero .sub{color:var(--ink);opacity:.72;font-size:clamp(15px,4vw,18px);margin-top:10px;max-width:32ch;margin-inline:auto;font-weight:600;position:relative;z-index:2}
  .note{max-width:600px;margin:20px auto 0;background:var(--card);border-radius:22px;
    padding:16px 20px;font-size:15px;box-shadow:var(--soft);text-align:left;position:relative;z-index:2;border-left:7px solid var(--pink)}
  .note b{font-weight:700}
  .scallop{height:20px;width:100%;margin-top:24px;
    background:radial-gradient(circle at 11px 20px, var(--pink) 11px, transparent 12px) repeat-x;
    background-size:22px 20px;opacity:.9}

  /* ---------- progress ---------- */
  .progress-wrap{max-width:600px;margin:24px auto 0;padding:0 20px}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;font-size:14px;color:var(--muted);font-weight:600}
  .progress-top b{color:var(--ink);font-family:var(--display);font-size:16px}
  .bar{height:16px;background:#fff;border:2px solid rgba(58,47,34,.12);border-radius:999px;overflow:hidden;box-shadow:var(--soft)}
  .bar>i{display:block;height:100%;width:0;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1);
    background:linear-gradient(90deg,var(--pink),var(--mustard),var(--green),var(--blue))}

  /* ---------- sections (painted-wall colour blocks) ---------- */
  main{max-width:900px;margin:0 auto;padding:6px 14px 30px}
  .cat{margin-top:22px;padding:16px 15px 22px;border-radius:28px}
  .pennant{display:inline-flex;align-items:center;gap:8px;font-family:var(--display);font-weight:800;
    font-size:15px;letter-spacing:.02em;color:#fff;padding:7px 26px 7px 15px;margin:2px 0 16px 2px;background:var(--c);
    clip-path:polygon(0 0,100% 0,calc(100% - 13px) 50%,100% 100%,0 100%);text-transform:uppercase;box-shadow:var(--soft)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:15px}
  .card{background:var(--card);border:2px solid var(--c);border-radius:20px;box-shadow:var(--soft);
    overflow:hidden;display:flex;flex-direction:column;transition:transform .16s,box-shadow .16s}
  .card:hover{transform:translateY(-3px);box-shadow:var(--soft-lg)}
  .card.claimed{opacity:.72}
  .thumb{height:118px;display:grid;place-items:center;position:relative;text-decoration:none;
    background:color-mix(in srgb, var(--c) 16%, #fff)}
  .thumb svg{width:52px;height:52px}
  .thumb .go{position:absolute;right:9px;bottom:9px;background:#fff;border-radius:999px;color:var(--c);
    font-family:var(--display);font-weight:700;font-size:11px;padding:4px 10px;box-shadow:var(--soft)}
  .body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:9px;flex:1}
  .card h3{font-size:19px;font-weight:700}
  .card h3 a{text-decoration:none}
  .card h3 a:hover{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:2px}
  .spec{font-size:13.5px;color:var(--muted);font-weight:600}
  .price{font-family:var(--display);font-weight:700;font-size:17px;color:var(--c)}
  .stores{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .store-lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .chip{font-size:12.5px;font-weight:700;font-family:var(--display);text-decoration:none;padding:4px 12px;border-radius:999px;
    border:2px solid var(--c);background:#fff;color:var(--ink);transition:.12s;white-space:nowrap}
  .chip:hover{background:var(--c);color:#fff}
  .foot{margin-top:auto;padding-top:4px}
  .claim-btn{width:100%;border:0;cursor:pointer;font-family:var(--display);font-weight:700;
    font-size:15px;padding:12px;border-radius:13px;background:var(--green);color:#fff;box-shadow:var(--soft);transition:.12s}
  .claim-btn:hover{transform:translateY(-1px);box-shadow:var(--soft-lg)}
  .stamp{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .stamp .badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--display);font-weight:700;font-size:13.5px;
    background:color-mix(in srgb, var(--green) 14%, #fff);border-radius:10px;padding:6px 11px;color:var(--green);transform:rotate(-2deg)}
  .stamp .badge svg{width:16px;height:16px}
  .undo{border:0;background:transparent;color:var(--muted);text-decoration:underline;cursor:pointer;font-family:var(--body);font-weight:700;font-size:12.5px}

  /* ---------- sending a gift ---------- */
  .sendbox{max-width:640px;margin:40px auto 0;padding:0 16px}
  .sendcard{background:var(--card);border-radius:24px;box-shadow:var(--soft-lg);overflow:hidden}
  .sendcard .top{background:var(--pink);padding:16px 22px;display:flex;align-items:center;gap:12px}
  .sendcard .top svg{width:38px;height:38px;flex:none}
  .sendcard .top h2{font-size:24px;font-weight:800;color:#fff}
  .sendcard .inner{padding:20px 22px 24px}
  .sendcard p{font-size:15px;margin-bottom:16px}
  .addr{background:color-mix(in srgb, var(--blue) 8%, #fff);border:2px dashed var(--blue);border-radius:16px;padding:16px 18px}
  .addr .lbl{font-family:var(--display);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:6px}
  .addr .val{font-size:16px;font-weight:700;line-height:1.55}
  .addr.hidden .val{filter:blur(6px);user-select:none}
  .reveal{margin-top:12px;border:0;background:var(--blue);color:#fff;font-family:var(--display);
    font-weight:700;font-size:14px;padding:10px 16px;border-radius:12px;cursor:pointer;box-shadow:var(--soft);transition:.12s}
  .reveal:hover{transform:translateY(-1px);box-shadow:var(--soft-lg)}
  .addr.shown .reveal{display:none}

  footer{text-align:center;color:var(--muted);font-size:13.5px;font-weight:600;padding:34px 20px 10px}
  footer .hand{font-family:var(--hand);font-size:21px;color:var(--ink)}

  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(58,47,34,.5);display:none;place-items:center;z-index:50;padding:20px}
  .overlay.open{display:grid}
  .modal{background:var(--card);border-radius:22px;padding:24px;width:100%;max-width:370px;box-shadow:var(--soft-lg);border-top:8px solid var(--mustard)}
  .modal h4{font-size:22px;margin-bottom:4px}
  .modal p{font-size:14px;color:var(--muted);font-weight:600;margin-bottom:14px}
  .modal input{width:100%;padding:12px 14px;border:2px solid var(--mustard);border-radius:12px;font-family:var(--body);font-weight:600;font-size:15px;background:var(--paper);color:var(--ink)}
  .modal input:focus{outline:none;box-shadow:0 0 0 3px rgba(239,167,44,.35)}
  .modal-actions{display:flex;gap:10px;margin-top:16px}
  .modal-actions button{flex:1;padding:12px;border-radius:12px;font-family:var(--display);font-weight:700;font-size:14px;cursor:pointer;border:0}
  .btn-ghost{background:#f0e7d6;color:var(--ink)}
  .btn-solid{background:var(--green);color:#fff;box-shadow:var(--soft)}

  :focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  @media (max-width:520px){.topbar{justify-content:center}.grid{grid-template-columns:1fr}.hero h1{font-size:44px}}
</style>
</head>
<body>
<div class="page">

<div class="topbar">
  <div class="brand">
    <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="17" fill="#EFA72C" stroke="#3a2f22" stroke-width="2.5"/><path d="M26 10a13 13 0 1 0 0 20 15 15 0 0 1 0-20z" fill="#FCF6EA"/><circle cx="15" cy="18" r="1.6" fill="#3a2f22"/><circle cx="22" cy="18" r="1.6" fill="#3a2f22"/><path d="M15 23q4 3 8 0" stroke="#3a2f22" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    Moony's World
  </div>
  <div class="controls">
    <div class="seg lang" role="group" aria-label="Language">
      <button data-lang="en" aria-pressed="true">EN</button>
      <button data-lang="pt" aria-pressed="false">PT</button>
      <button data-lang="it" aria-pressed="false">IT</button>
    </div>
    <a class="send-link" href="#sending" data-i18n="sendNav">Sending a gift?</a>
  </div>
</div>
<div class="checker"></div>
<div class="walls" role="group" aria-label="Background colour">
  <span class="wlbl">Background</span>
  <button data-wall="#FBF3E3" aria-pressed="true"  style="background:#FBF3E3" aria-label="Cream"></button>
  <button data-wall="#FCE39B" aria-pressed="false" style="background:#FCE39B" aria-label="Butter yellow"></button>
  <button data-wall="#F7BFB4" aria-pressed="false" style="background:#F7BFB4" aria-label="Coral"></button>
  <button data-wall="#BFD9F2" aria-pressed="false" style="background:#BFD9F2" aria-label="Sky blue"></button>
  <button data-wall="#BFE3C6" aria-pressed="false" style="background:#BFE3C6" aria-label="Mint green"></button>
  <button data-wall="#F6CBDB" aria-pressed="false" style="background:#F6CBDB" aria-label="Blush pink"></button>
</div>

<section class="hero">
  <div class="stars" aria-hidden="true"></div>
  <div class="hero-illo" aria-hidden="true">
    <svg viewBox="0 0 64 64"><path d="M44 12a24 24 0 1 0 0 40 28 28 0 0 1 0-40z" fill="#EFA72C" stroke="#3a2f22" stroke-width="3"/><circle cx="26" cy="30" r="2.4" fill="#3a2f22"/><circle cx="36" cy="30" r="2.4" fill="#3a2f22"/><path d="M25 38q6 5 12 0" stroke="#3a2f22" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="20" cy="40" r="2.6" fill="#E8503A" opacity=".7"/></svg>
    <svg viewBox="0 0 64 64"><path d="M32 6l7 16 17 1-13 11 4 17-15-9-15 9 4-17L8 23l17-1z" fill="#E8503A" stroke="#3a2f22" stroke-width="3" stroke-linejoin="round"/><circle cx="27" cy="30" r="2" fill="#3a2f22"/><circle cx="37" cy="30" r="2" fill="#3a2f22"/><path d="M28 36q4 3 8 0" stroke="#3a2f22" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>
    <svg viewBox="0 0 64 64"><g stroke="#3a2f22" stroke-width="3" stroke-linecap="round"><path d="M32 4v8M32 52v8M4 32h8M52 32h8M12 12l6 6M46 46l6 6M52 12l-6 6M18 46l-6 6"/></g><circle cx="32" cy="32" r="15" fill="#3F8F5A" stroke="#3a2f22" stroke-width="3"/><circle cx="27" cy="30" r="2" fill="#FCF6EA"/><circle cx="37" cy="30" r="2" fill="#FCF6EA"/><path d="M27 37q5 4 10 0" stroke="#FCF6EA" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>
  </div>
  <img class="header-img" src="assets/header.png" alt="Moony's World">
  <p class="sub" data-i18n="sub"></p>
  <div class="note" data-i18n="note"></div>
</section>
<div class="scallop"></div>

<div class="progress-wrap">
  <div class="progress-top">
    <span><b id="claimedCount">0</b> <span data-i18n="spoken"></span></span>
    <span id="totalCount"></span>
  </div>
  <div class="bar"><i id="barFill"></i></div>
</div>

<main id="list"></main>

<section class="sendbox" id="sending">
  <div class="sendcard">
    <div class="top">
      <svg viewBox="0 0 40 40" aria-hidden="true"><rect x="4" y="9" width="32" height="22" rx="3" fill="#FCF6EA" stroke="#3a2f22" stroke-width="2.5"/><path d="M5 11l15 11 15-11" fill="none" stroke="#3a2f22" stroke-width="2.5" stroke-linejoin="round"/><path d="M28 4l2.2 4.5L35 9l-3.5 3 .9 5-4.4-2.5L23.6 17l.9-5L21 9l4.8-.5z" fill="#EFA72C" stroke="#3a2f22" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <h2 data-i18n="sendTitle"></h2>
    </div>
    <div class="inner">
      <p data-i18n="sendBody"></p>
      <div class="addr hidden" id="addr">
        <div class="lbl" data-i18n="shipTo"></div>
        <div class="val">Marina &amp; Ryan<br>&lsaquo; your Melbourne address &rsaquo;<br>VIC, Australia</div>
        <button class="reveal" id="revealBtn" data-i18n="reveal"></button>
      </div>
    </div>
  </div>
</section>

<footer>
  <span data-i18n="footer"></span><br>
  <span class="hand">Marina &amp; Ryan &middot; Melbourne</span>
</footer>
</div><!-- /page -->

<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h4 id="modalTitle" data-i18n="modalTitle"></h4>
    <p data-i18n="modalDesc"></p>
    <input id="nameInput" type="text" autocomplete="name">
    <div class="modal-actions">
      <button class="btn-ghost" id="cancelBtn" data-i18n="cancel"></button>
      <button class="btn-solid" id="confirmBtn" data-i18n="confirm"></button>
    </div>
  </div>
</div>

let lang="en",pendingId=null;
const listEl=document.getElementById("list");
const STAR='<svg viewBox="0 0 24 24"><path d="M12 2l2.6 6L21 8.6l-4.8 4.2L17.6 20 12 16.5 6.4 20l1.4-7.2L3 8.6 9.4 8z" fill="#EFA72C" stroke="#3a2f22" stroke-width="1.6" stroke-linejoin="round"/></svg>';
function render(){
  const order=["essentials","sleep","out","library"];
  listEl.innerHTML="";
  order.forEach(k=>{
    const inCat=ITEMS.filter(i=>i.cat===k); if(!inCat.length)return;
    const c=CATS[k];
    const sec=document.createElement("section");sec.className="cat";
    sec.style.setProperty("--c",c.color);
    sec.innerHTML=`<span class="pennant">${c[lang]}</span><div class="grid"></div>`;
    const grid=sec.querySelector(".grid");
    inCat.forEach(item=>{
      const [name,spec]=item[lang];
      const card=document.createElement("article");
      card.className="card"+(item.claimed?" claimed":"");
      const stores=item.stores.map(([n,u])=>`<a class="chip" href="${u}" target="_blank" rel="noopener">${n}</a>`).join("");
      const foot=item.claimed
        ?`<div class="stamp"><span class="badge">${STAR}${T[lang].spokenBy} ${item.claimed.by}</span><button class="undo" data-unclaim="${item.id}">${T[lang].undo}</button></div>`
        :`<button class="claim-btn" data-claim="${item.id}">${T[lang].claim}</button>`;
      card.innerHTML=`
        <a class="thumb" href="${item.link}" target="_blank" rel="noopener">${MOTIF[item.cat]}<span class="go">${T[lang].view} ↗</span></a>
        <div class="body">
          <h3><a href="${item.link}" target="_blank" rel="noopener">${name}</a></h3>
          <p class="spec">${spec}</p>
          <div class="price">${item.price}</div>
          <div class="stores"><span class="store-lbl">${T[lang].storeLbl}</span>${stores}</div>
          <div class="foot">${foot}</div>
        </div>`;
      grid.appendChild(card);
    });
    listEl.appendChild(sec);
  });
  updateProgress();applyText();
}
function updateProgress(){
  const total=ITEMS.length,done=ITEMS.filter(i=>i.claimed).length;
  document.getElementById("claimedCount").textContent=done;
  document.getElementById("totalCount").textContent=T[lang].total(total);
  document.getElementById("barFill").style.width=(done/total*100)+"%";
}
function applyText(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k=el.getAttribute("data-i18n");
    if(T[lang][k]!==undefined) el.innerHTML=T[lang][k];
  });
}
listEl.addEventListener("click",e=>{
  const cl=e.target.closest("[data-claim]"),un=e.target.closest("[data-unclaim]");
  if(cl){openModal(+cl.dataset.claim);}
  if(un){ITEMS.find(i=>i.id===+un.dataset.unclaim).claimed=null;render();}
});
document.querySelectorAll(".seg.lang button").forEach(b=>b.addEventListener("click",()=>{
  lang=b.dataset.lang;document.documentElement.lang=lang;
  document.querySelectorAll(".seg.lang button").forEach(x=>x.setAttribute("aria-pressed",x===b));
  render();
}));
document.querySelectorAll(".walls button").forEach(b=>b.addEventListener("click",()=>{
  document.body.style.setProperty("--wall",b.dataset.wall);
  document.querySelectorAll(".walls button").forEach(x=>x.setAttribute("aria-pressed",x===b));
}));
const overlay=document.getElementById("overlay"),nameInput=document.getElementById("nameInput");
function openModal(id){pendingId=id;nameInput.value="";overlay.classList.add("open");setTimeout(()=>nameInput.focus(),50);}
function closeModal(){overlay.classList.remove("open");pendingId=null;}
document.getElementById("cancelBtn").addEventListener("click",closeModal);
overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
document.getElementById("confirmBtn").addEventListener("click",confirmClaim);
nameInput.addEventListener("keydown",e=>{if(e.key==="Enter")confirmClaim();});
function confirmClaim(){const nm=nameInput.value.trim();if(!nm){nameInput.focus();return;}const it=ITEMS.find(i=>i.id===pendingId);if(it)it.claimed={by:nm};closeModal();render();}
document.getElementById("revealBtn").addEventListener("click",()=>{const a=document.getElementById("addr");a.classList.remove("hidden");a.classList.add("shown");});
(function stars(){const w=document.querySelector(".stars");const cols=["#E8503A","#EFA72C","#3F8F5A","#3E7CC4","#EE8AA6"];for(let i=0;i<12;i++){const s=document.createElement("span");s.textContent="✦";s.style.left=Math.random()*100+"%";s.style.top=Math.random()*78+"%";s.style.color=cols[i%cols.length];s.style.animationDelay=(Math.random()*3)+"s";s.style.fontSize=(10+Math.random()*10)+"px";w.appendChild(s);}})();
render();
